[pytest]
testpaths = api ui
python_files = test_*.py test.py *_test.py
addopts = -q --strict-markers
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)s [%(name)s] %(message)s
markers =
    smoke: core smoke cases
    ui: ui automation cases
    labels(*tags): excel labels binding (e.g. smoke, auth, order)
