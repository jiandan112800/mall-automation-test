name: CI with Allure

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_ui:
        description: "Run UI tests (requires reachable UI/backend)"
        required: false
        default: "false"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest and collect allure results
        env:
          RUN_UI: ${{ github.event.inputs.run_ui || 'false' }}
        run: |
          set +e
          if [ "$RUN_UI" = "true" ]; then
            pytest --alluredir=allure-results
          else
            pytest api --alluredir=allure-results
          fi
          echo $? > .pytest_exit_code

      - name: Setup Java for Allure CLI
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline --unsafe-perm=true

      - name: Generate Allure report
        run: |
          allure generate allure-results -o allure-report --clean || true

      - name: Upload allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      - name: Upload allure html report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Fail job when tests failed
        run: |
          code=$(cat .pytest_exit_code)
          if [ "$code" -ne 0 ]; then
            echo "pytest failed with exit code: $code"
            exit "$code"
          fi
